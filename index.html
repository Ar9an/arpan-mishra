<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colour Change</title>
</head>

<body>

<button class="control">Red</button>
<button class="control">Blue</button>
<button class="control">Green</button>

<script>

let ctrls = document.querySelectorAll(".control");

ctrls.forEach(function(btn){

    btn.addEventListener("click", function(event){

        const color = event.target.innerText;
        document.body.style.backgroundColor = color;

    });

});

</script>

</body>
</html>
